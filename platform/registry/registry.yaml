apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: openebs-hostpath
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      nodeSelector:
        registry-node: "true"
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      initContainers:
      - name: migrate-registry-data
        image: registry.local:30500/library/busybox:1.36.1
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -eux
          echo "checking registry data migration..."
          ls -lah /old-registry || true
          ls -lah /var/lib/registry || true

          if [ ! -d /var/lib/registry/docker ]; then
            echo "new OpenEBS registry volume is empty, copying old hostPath data..."
            cp -a /old-registry/. /var/lib/registry/
            touch /var/lib/registry/.migrated-from-hostpath
            echo "migration finished"
          else
            echo "OpenEBS registry volume already has docker directory, skip copy"
          fi

          du -sh /var/lib/registry || true
          ls -lah /var/lib/registry | head
        volumeMounts:
        - name: old-registry-data
          mountPath: /old-registry
          readOnly: true
        - name: registry-data
          mountPath: /var/lib/registry
      containers:
      - name: registry
        image: m.daocloud.io/docker.io/library/registry:2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: registry-data
          mountPath: /var/lib/registry
      volumes:
      - name: old-registry-data
        hostPath:
          path: /data/registry
          type: DirectoryOrCreate
      - name: registry-data
        persistentVolumeClaim:
          claimName: registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: registry-service
  namespace: registry
spec:
  type: NodePort
  selector:
    app: registry
  ports:
  - name: registry
    port: 5000
    targetPort: 5000
    nodePort: 30500
